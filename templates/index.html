<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}
        Index
        {% endblock title %}-Todos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbarStyle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/TableStyle.css') }}">
</head>

<body>
    <h2>
        {% block heading %}
        📝Todo📝
        {% endblock heading %}
    </h2>
    <div class="container-fluid">
        {% block add %}
        <div class="container my-4">
            <h5>Your todos</h5>
            {% if allTodo|length == 0 %}
            <div class="alert alert-light" role="alert">
                No todos here. Add your first todo now
            </div>
            {% else %}


            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">Sl_no.</th>
                        <th scope="col">Title</th>
                        <th scope="col">Todo</th>
                        <th scope="col"> </th>
                    </tr>
                </thead>
                <tbody>
                    {% for Todo in allTodo %}
                    <tr>
                        <th scope="row">{{loop.index}}</th>
                        <td>{{Todo.name}}</td> <!-- Changed from Todo.title -->
                        <td>{{Todo.password}}</td> <!-- Changed from Todo.todo -->
                        <td></td>
                    </tr>
                    {% endfor %}



                </tbody>
            </table>
            {% endif %}
        </div>
        {% endblock add %}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
