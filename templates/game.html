<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KBC – Kaun Banega Crorepati</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- PyScript -->
<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css"/>
<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

<style>
/* ============================================================
   CSS VARIABLES
   ============================================================ */
:root {
  --gold:       #FFD700;
  --gold-dim:   #B8860B;
  --gold-lite:  #FFF5CC;
  --deep:       #01060F;
  --navy:       #030E22;
  --blue-mid:   #071840;
  --blue-hi:    #0B3585;
  --glow:       #1565FF;
  --orange:     #FF6500;
  --green:      #00E676;
  --red:        #FF1744;
  --white:      #EEF2FF;
  --muted:      rgba(200,215,255,0.50);
  --f-title:    'Cinzel', serif;
  --f-body:     'Rajdhani', sans-serif;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--deep);
  font-family: var(--f-body);
  color: var(--white);
}
button { border: none; cursor: pointer; font-family: inherit; }
input  { font-family: inherit; }

/* PyScript loading overlay tweak */
py-config { display: none; }

/* ============================================================
   ANIMATED STAR BACKGROUND
   ============================================================ */
.star-field {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden; pointer-events: none;
}
.star {
  position: absolute; border-radius: 50%;
  background: white;
  animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
  animation-delay: var(--del, 0s);
  opacity: 0;
}
.star.gold { background: var(--gold); }
@keyframes twinkle {
  0%   { opacity: 0; transform: scale(0.5); }
  100% { opacity: var(--op, 0.8); transform: scale(1); }
}

/* Radial glow center */
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 55% at 50% 45%,
    rgba(21,101,255,0.10) 0%, transparent 70%);
  animation: glowPulse 6s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  0%   { opacity: 0.5; transform: scale(1); }
  100% { opacity: 1;   transform: scale(1.08); }
}

/* ============================================================
   SCREENS  (stack on top of each other, toggle .active)
   ============================================================ */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.55s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ============================================================
   INTRO / NAME SCREEN
   ============================================================ */
#nameScreen { gap: 0; }

.logo-kbc {
  font-family: var(--f-title);
  font-size: clamp(5rem, 16vw, 11rem);
  font-weight: 900;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg,
    #B8860B 0%, #FFD700 30%, #FFF5CC 52%, #FFD700 72%, #B8860B 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 0 50px rgba(255,215,0,0.45));
  animation: logoFloat 4s ease-in-out infinite alternate;
  line-height: 1;
}
@keyframes logoFloat {
  0%   { filter: drop-shadow(0 0 25px rgba(255,215,0,0.3)); transform: translateY(0); }
  100% { filter: drop-shadow(0 0 70px rgba(255,215,0,0.75)); transform: translateY(-10px); }
}
.logo-sub {
  font-family: var(--f-title);
  font-size: clamp(0.65rem, 2vw, 1rem);
  letter-spacing: 0.38em; text-transform: uppercase;
  color: rgba(255,215,0,0.55);
  margin-bottom: 2.8rem; margin-top: 0.4rem;
}

.entry-card {
  background: linear-gradient(135deg, rgba(7,24,64,0.96), rgba(11,53,133,0.4));
  border: 1px solid rgba(255,215,0,0.28);
  padding: 2.6rem 3rem 2.2rem;
  width: min(420px, 90vw);
  position: relative; overflow: hidden;
  clip-path: polygon(14px 0%, 100% 0%, calc(100% - 14px) 100%, 0% 100%);
}
.entry-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: scanLine 2.4s linear infinite;
}
@keyframes scanLine {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.entry-label {
  display: block; font-size: 0.62rem; letter-spacing: 0.32em;
  text-transform: uppercase; color: rgba(255,215,0,0.5); margin-bottom: 0.55rem;
}
.entry-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,215,0,0.3);
  color: var(--white);
  font-size: 1.1rem; font-weight: 600; letter-spacing: 0.05em;
  padding: 0.82rem 1.1rem; outline: none; margin-bottom: 1.5rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.entry-input:focus {
  border-color: rgba(255,215,0,0.7);
  box-shadow: 0 0 20px rgba(255,215,0,0.14);
}
.entry-input::placeholder { color: rgba(255,255,255,0.22); }

/* ============================================================
   GOLD BUTTON  (reused everywhere)
   ============================================================ */
.btn-gold {
  width: 100%;
  font-family: var(--f-title); font-size: 0.82rem;
  font-weight: 700; letter-spacing: 0.2em;
  color: var(--deep);
  background: linear-gradient(135deg, #FFD700, #FFC200, #FFD700);
  padding: 1rem 2rem;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  position: relative; overflow: hidden;
  transition: all 0.28s;
  box-shadow: 0 0 28px rgba(255,215,0,0.32);
}
.btn-gold::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  transform: translateX(-100%);
  animation: btnShine 3.2s infinite 1.5s;
}
@keyframes btnShine {
  0%     { transform: translateX(-100%); }
  30%,100%{ transform: translateX(150%); }
}
.btn-gold:hover { transform: scale(1.03); box-shadow: 0 0 55px rgba(255,215,0,0.55); }
.btn-gold:active { transform: scale(0.97); }

/* ============================================================
   GAME SCREEN LAYOUT
   ============================================================ */
#gameScreen {
  flex-direction: row;
  align-items: stretch; justify-content: flex-start;
  overflow: hidden;
}

/* ---- LEFT SIDEBAR: Prize Ladder ---- */
.sidebar {
  position: relative; z-index: 2;
  width: 165px; flex-shrink: 0;
  background: linear-gradient(180deg, rgba(1,6,15,0.98), rgba(3,14,34,0.95));
  border-right: 1px solid rgba(255,215,0,0.10);
  display: flex; flex-direction: column;
  overflow-y: auto; scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }
.sb-head {
  padding: 0.9rem 0.8rem 0.5rem;
  font-family: var(--f-title); font-size: 0.52rem;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(255,215,0,0.38);
  border-bottom: 1px solid rgba(255,215,0,0.07);
  flex-shrink: 0;
}
.sb-list {
  flex: 1; display: flex; flex-direction: column-reverse;
  justify-content: center; padding: 0.4rem 0;
}
.sb-row {
  display: flex; align-items: center; gap: 0.45rem;
  padding: 0.28rem 0.8rem;
  font-size: 0.66rem; font-weight: 600;
  color: rgba(255,255,255,0.26);
  border-left: 3px solid transparent;
  transition: all 0.28s;
}
.sb-row .sbn { min-width: 17px; text-align: right; font-size: 0.58rem; color: rgba(255,215,0,0.22); }
.sb-row .sbp { flex: 1; text-align: right; }
.sb-row.milestone  { color: rgba(255,215,0,0.52); }
.sb-row.current {
  color: var(--gold);
  background: rgba(255,215,0,0.08);
  border-left-color: var(--gold);
  font-size: 0.72rem; font-weight: 700;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}
.sb-row.current .sbn { color: var(--gold); }
.sb-row.done        { color: rgba(0,230,118,0.48); }
.sb-row.done.milestone { color: rgba(0,230,118,0.70); }

/* ---- CENTER MAIN ---- */
.game-main {
  flex: 1; position: relative; z-index: 2;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.4rem; flex-shrink: 0;
  background: linear-gradient(90deg,
    rgba(1,6,15,0.96), rgba(7,24,64,0.72), rgba(1,6,15,0.96));
  border-bottom: 1px solid rgba(255,215,0,0.10);
}
.tb-player {
  font-family: var(--f-title); font-size: 0.92rem; font-weight: 600;
  color: var(--gold); letter-spacing: 0.08em; min-width: 130px;
}
.tb-center {
  font-family: var(--f-title); font-size: 0.8rem;
  letter-spacing: 0.22em; color: rgba(255,215,0,0.38);
  text-transform: uppercase; text-align: center;
}
.tb-prize-wrap {
  min-width: 130px; text-align: right;
  display: flex; flex-direction: column; align-items: flex-end; gap: 0.04rem;
}
.tb-prize-lbl {
  font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.32);
}
.tb-prize-amt {
  font-family: var(--f-title); font-size: 1.15rem; font-weight: 700;
  color: var(--gold); text-shadow: 0 0 18px rgba(255,215,0,0.5);
}

/* Question meta row */
.q-meta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.55rem 1.4rem; flex-shrink: 0;
}
.q-label {
  font-size: 0.62rem; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,215,0,0.38);
}
.timer-wrap { display: flex; align-items: center; gap: 0.5rem; }
.timer-bar  {
  width: 110px; height: 3px;
  background: rgba(255,215,0,0.1); overflow: hidden;
}
.timer-fill {
  height: 100%; background: var(--gold);
  transition: width 1s linear;
  box-shadow: 0 0 8px rgba(255,215,0,0.55);
}
.timer-fill.urgent { background: var(--red); box-shadow: 0 0 8px rgba(255,23,68,0.6); }
.timer-num {
  font-family: var(--f-title); font-size: 1.35rem; font-weight: 700;
  color: var(--gold); text-shadow: 0 0 12px rgba(255,215,0,0.5);
  min-width: 34px; text-align: center;
}
.timer-num.urgent {
  color: var(--red); text-shadow: 0 0 12px rgba(255,23,68,0.6);
  animation: urgentPulse 0.5s ease-in-out infinite alternate;
}
@keyframes urgentPulse {
  0%   { transform: scale(1); }
  100% { transform: scale(1.18); }
}

/* Question box */
.q-box-wrap { padding: 0 1.4rem; flex-shrink: 0; }
.q-box {
  background: linear-gradient(135deg, rgba(7,24,64,0.9), rgba(11,53,133,0.38));
  border: 1px solid rgba(255,215,0,0.20);
  padding: 1.3rem 1.8rem;
  position: relative; overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px,
                     100% 100%, 18px 100%, 0 calc(100% - 18px));
}
.q-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: scanLine 3.2s linear infinite;
}
.q-box-inner {
  display: flex; align-items: center; justify-content: center; min-height: 68px;
}
#qText {
  font-size: clamp(0.95rem, 2.1vw, 1.28rem); font-weight: 600;
  line-height: 1.55; text-align: center; color: var(--white);
}

/* Lifelines bar */
.lifelines {
  display: flex; align-items: center; justify-content: center;
  gap: 0.7rem; padding: 0.7rem 1.4rem; flex-shrink: 0;
}
.ll-btn {
  display: flex; flex-direction: column; align-items: center; gap: 0.22rem;
  padding: 0.5rem 1rem;
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.28);
  color: var(--gold);
  clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
  transition: all 0.22s;
  position: relative; overflow: hidden;
}
.ll-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,215,0,0.12), transparent);
  opacity: 0; transition: opacity 0.22s;
}
.ll-btn:hover:not(:disabled)::before { opacity: 1; }
.ll-btn:hover:not(:disabled) {
  border-color: rgba(255,215,0,0.7);
  box-shadow: 0 0 18px rgba(255,215,0,0.22);
  transform: translateY(-2px);
}
.ll-btn:disabled { opacity: 0.18; cursor: not-allowed; filter: grayscale(1); }
.ll-icon { font-size: 1.25rem; filter: drop-shadow(0 0 5px rgba(255,215,0,0.5)); }
.ll-name { font-size: 0.52rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; }

/* Options grid */
.opts-wrap {
  flex: 1; display: flex; align-items: center;
  padding: 0.4rem 1.4rem 0.9rem;
}
.opts-grid {
  width: 100%; display: grid;
  grid-template-columns: 1fr 1fr; gap: 0.6rem;
}
.opt {
  display: flex; align-items: center; gap: 0.85rem;
  background: rgba(3,14,34,0.86);
  border: 1px solid rgba(255,215,0,0.17);
  padding: 0.8rem 1.1rem; text-align: left; color: var(--white);
  clip-path: polygon(13px 0%, 100% 0%, calc(100% - 13px) 100%, 0% 100%);
  position: relative; overflow: hidden;
  transition: all 0.2s ease;
}
.opt::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.07), transparent);
  transform: translateX(-100%); transition: transform 0.4s ease;
}
.opt:hover:not(:disabled)::before { transform: translateX(100%); }
.opt:hover:not(:disabled) {
  border-color: rgba(255,215,0,0.6);
  background: rgba(11,53,133,0.50);
  box-shadow: 0 0 22px rgba(255,215,0,0.16);
  transform: scale(1.015);
}
.opt:disabled { cursor: not-allowed; }
.opt-lbl {
  font-family: var(--f-title); font-size: 0.82rem; font-weight: 700;
  color: var(--gold); flex-shrink: 0; min-width: 16px;
}
.opt-sep {
  width: 1px; height: 22px;
  background: rgba(255,215,0,0.20); flex-shrink: 0;
}
.opt-txt { font-size: clamp(0.82rem, 1.55vw, 0.97rem); font-weight: 600; line-height: 1.3; }

/* Option state classes */
.opt.selected {
  border-color: rgba(255,165,0,0.9);
  background: rgba(180,80,0,0.35);
  box-shadow: 0 0 28px rgba(255,165,0,0.35);
  animation: optSelected 0.55s ease;
}
@keyframes optSelected {
  0%,100%{ transform: scale(1); }
  50%    { transform: scale(1.025); }
}
.opt.correct {
  border-color: var(--green);
  background: rgba(0,100,50,0.45);
  box-shadow: 0 0 38px rgba(0,230,118,0.42);
  animation: optCorrect 0.85s ease;
}
@keyframes optCorrect {
  0%,100%{ box-shadow: 0 0 30px rgba(0,230,118,0.35); }
  50%    { box-shadow: 0 0 65px rgba(0,230,118,0.8); }
}
.opt.wrong {
  border-color: var(--red);
  background: rgba(120,0,20,0.45);
  box-shadow: 0 0 28px rgba(255,23,68,0.40);
  animation: optWrong 0.5s ease;
}
@keyframes optWrong {
  0%,100%{ transform: translateX(0); }
  25%    { transform: translateX(-7px); }
  75%    { transform: translateX(7px); }
}
.opt.hidden50 { opacity: 0.09; pointer-events: none; }

/* ---- RIGHT PANEL: Audience Chart ---- */
.right-panel {
  width: 172px; flex-shrink: 0;
  background: linear-gradient(180deg, rgba(1,6,15,0.98), rgba(3,14,34,0.95));
  border-left: 1px solid rgba(255,215,0,0.10);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.4rem 0.8rem;
  position: relative; z-index: 2;
  transition: opacity 0.4s ease;
}
.right-panel.hidden { opacity: 0; pointer-events: none; }
.rp-title {
  font-family: var(--f-title); font-size: 0.58rem;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(255,215,0,0.48); margin-bottom: 1.1rem; text-align: center;
}
.aud-bars { display: flex; align-items: flex-end; justify-content: center; gap: 0.55rem; height: 108px; }
.aud-col  { display: flex; flex-direction: column; align-items: center; gap: 0.28rem; }
.aud-bar  {
  width: 26px; border-radius: 2px 2px 0 0;
  background: linear-gradient(to top, var(--gold-dim), var(--gold));
  height: 0px; transition: height 0.75s cubic-bezier(0.25,0.8,0.25,1);
  box-shadow: 0 0 8px rgba(255,215,0,0.28);
}
.aud-lbl { font-family: var(--f-title); font-size: 0.68rem; font-weight: 700; color: var(--gold); }
.aud-pct { font-size: 0.6rem; color: rgba(255,255,255,0.48); }

/* ============================================================
   MODAL  (lock confirm / continue / info)
   ============================================================ */
.modal-veil {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-veil.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: linear-gradient(135deg, rgba(3,14,34,0.98), rgba(11,53,133,0.35));
  border: 1px solid rgba(255,215,0,0.40);
  padding: 2.4rem 2.4rem 1.9rem;
  width: min(430px, 92vw);
  clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
  text-align: center; position: relative; overflow: hidden;
  box-shadow: 0 0 80px rgba(255,215,0,0.10), 0 30px 80px rgba(0,0,0,0.70);
  animation: modalIn 0.32s cubic-bezier(0.25,0.8,0.25,1);
}
@keyframes modalIn {
  0%   { transform: scale(0.88) translateY(22px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.modal-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.modal-icon { font-size: 2.8rem; margin-bottom: 0.7rem; display: block;
  filter: drop-shadow(0 0 14px rgba(255,215,0,0.5)); }
.modal-head {
  font-family: var(--f-title); font-size: 1.1rem; font-weight: 700;
  color: var(--gold); letter-spacing: 0.08em; margin-bottom: 0.9rem;
}
.modal-body {
  font-size: 0.92rem; line-height: 1.65;
  color: rgba(255,255,255,0.72); margin-bottom: 1.4rem;
}
.modal-body strong { color: var(--gold-lite); font-weight: 700; }
.modal-footer {
  display: flex; flex-direction: column; gap: 0.5rem; align-items: center;
}
.btn-modal {
  font-family: var(--f-title); font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.17em; color: var(--deep);
  background: linear-gradient(135deg, #FFD700, #FFC200);
  padding: 0.72rem 2.2rem;
  clip-path: polygon(7px 0%, 100% 0%, calc(100% - 7px) 100%, 0% 100%);
  transition: all 0.22s;
  box-shadow: 0 0 18px rgba(255,215,0,0.28);
  width: 100%;
}
.btn-modal:hover { transform: scale(1.04); box-shadow: 0 0 40px rgba(255,215,0,0.50); }
.btn-modal.danger {
  background: linear-gradient(135deg, #8B0000, #500);
  color: var(--white);
  box-shadow: 0 0 18px rgba(139,0,0,0.28);
}
.btn-modal.neutral {
  background: linear-gradient(135deg, #2a2a3a, #111122);
  color: var(--white);
  box-shadow: none;
}

/* ============================================================
   RESULT SCREEN
   ============================================================ */
#resultScreen { gap: 1.3rem; text-align: center; padding: 2rem; }
.rs-icon {
  font-size: 5rem;
  filter: drop-shadow(0 0 28px rgba(255,215,0,0.6));
  animation: rsBounce 1.2s ease-in-out infinite alternate;
}
@keyframes rsBounce {
  0%   { transform: scale(1) translateY(0); }
  100% { transform: scale(1.1) translateY(-12px); }
}
.rs-title {
  font-family: var(--f-title);
  font-size: clamp(1.4rem, 4.5vw, 2.8rem); font-weight: 700;
  color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.5);
}
.rs-amount {
  font-family: var(--f-title);
  font-size: clamp(2rem, 7vw, 4.2rem); font-weight: 900;
  background: linear-gradient(135deg, #FFD700, #FFF5CC, #FFD700);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 0 22px rgba(255,215,0,0.5));
}
.rs-msg {
  font-size: clamp(0.88rem, 1.9vw, 1.1rem);
  color: var(--muted); letter-spacing: 0.07em; line-height: 1.55;
  max-width: 480px;
}
.rs-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 0.4rem; }
.btn-outline {
  font-family: var(--f-title); font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.17em; color: rgba(255,215,0,0.8);
  border: 1px solid rgba(255,215,0,0.35);
  padding: 0.72rem 1.7rem;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  background: rgba(255,215,0,0.05);

     PYSCRIPT  — game logic
     ====================================================== -->
<script type="py">
# =============================================================
# IMPORTS
# =============================================================
from pyscript import document, window
from pyodide.ffi import create_proxy 
import random
import math
import js

# =============================================================
# STAR FIELD  (pure CSS stars created from Python)
# =============================================================
def build_stars():
    field = document.getElementById('starField')
    field.innerHTML = ''
    w = window.innerWidth
    h = window.innerHeight
    for _ in range(200):
        el = document.createElement('div')
        el.className = 'star' + (' gold' if random.random() < 0.07 else '')
        size = random.uniform(1, 3)
        el.style.cssText = (
            f"width:{size:.1f}px; height:{size:.1f}px;"
            f"left:{random.uniform(0,100):.1f}%; top:{random.uniform(0,100):.1f}%;"
            f"--dur:{random.uniform(2,6):.1f}s; --del:{random.uniform(0,5):.1f}s;"
            f"--op:{random.uniform(0.4,0.9):.2f};"
        )
        field.appendChild(el)

build_stars()

def on_resize(ev):
    build_stars()

window.addEventListener('resize', create_proxy(on_resize))

# =============================================================
# DATA  (from KaunBanegaCarrorparti.py)
# =============================================================

# money[] from Python
PRIZES = [
    '₹5,000', '₹10,000', '₹20,000', '₹40,000', '₹80,000',
    '₹1,60,000', '₹3,20,000', '₹6,40,000', '₹12,50,000', '₹25,00,000',
    '₹50,00,000', '₹1,00,00,000', '₹7,00,00,000'
]
PRIZE_RAW = [
    5000, 10000, 20000, 40000, 80000,
    160000, 320000, 640000, 1250000, 2500000,
    5000000, 10000000, 70000000
]
TOTAL_Q   = 13
MILESTONES = {6, 9}   # 0-indexed → visual gold milestone rows

# Questions dict from Python file + 3 wrong options each
QS = [
    {'q': 'What is the full form of NASA?',
     'a': 'National Aeronautics and Space Administration',
     'w': ['National Aviation and Space Authority',
           'North American Space Agency',
           'National Aerospace Survey Administration']},

    {'q': 'Which of these planets has no moons?',
     'a': 'Mercury and Venus',
     'w': ['Mars and Jupiter', 'Saturn and Uranus', 'Neptune and Pluto']},

    {'q': 'Who is known as the "Missile Man of India"?',
     'a': 'Dr. A.P.J. Abdul Kalam',
     'w': ['Dr. Vikram Sarabhai', 'Dr. Homi J. Bhabha', 'Dr. C.V. Raman']},

    {'q': 'With reference to genetics, what would best describe DNA and RNA?',
     'a': 'DNA and RNA are both nucleic acids',
     'w': ['DNA is a protein; RNA is a lipid',
           'Both are types of amino acids',
           'DNA stores energy; RNA transfers it']},

    {'q': 'Before the rise of Ranjit Singh, Punjab was under the control of what?',
     'a': 'Sikh Misls',
     'w': ['Mughal Empire', 'Afghan Durrani Empire', 'Maratha Confederacy']},

    {'q': 'Which Mughal ruler was the most secular in outlook?',
     'a': "Abu'l-Fath Jalal-ud-din Muhammad Akbar",
     'w': ['Aurangzeb Alamgir', 'Babur', 'Shah Jahan']},

    {'q': 'In which group of places is the Kumbh Mela held every twelve years?',
     'a': 'Prayagraj, Haridwar, Nashik, and Ujjain',
     'w': ['Varanasi, Mathura, Ayodhya, and Dwarka',
           'Amritsar, Tirupati, Shirdi, and Vrindavan',
           'Rishikesh, Bodh Gaya, Puri, and Somnath']},

    {'q': 'Which of these viruses takes its name from a place in Malaysia?',
     'a': 'Nipah virus',
     'w': ['Ebola virus', 'Zika virus', 'Hanta virus']},

    {'q': 'Which festival is known as the Festival of Lights?',
     'a': 'Diwali',
     'w': ['Holi', 'Eid', 'Baisakhi']},

    {'q': 'Which of these names means lightning?',
     'a': 'Adhira',
     'w': ['Anaya', 'Priya', 'Kavya']},

    {'q': 'Which actress is married to a professional golfer?',
     'a': 'Jena Sims',
     'w': ['Jennifer Aniston', 'Scarlett Johansson', 'Margot Robbie']},

    {'q': "Who is the singer of the Oscar-nominated song \"Pi's Lullaby\" from Life of Pi?",
     'a': 'Bombay Jayashri',
     'w': ['A.R. Rahman', 'Lata Mangeshkar', 'Shreya Ghoshal']},

    {'q': 'What do the five rings of the Olympics represent?',
     'a': 'The five continents',
     'w': ['The five founding nations',
           'The five Olympic values',
           'The five original sports']},
]

# =============================================================
# GAME STATE
# =============================================================
G = {}

def reset_state():
    global G
    G = {
        'q_idx':     0,
        'player':    'Contestant',
        'money_won': 0,            # mirrors Python m
        'll': {'5050': False, 'phone': False, 'audience': False},
        'answered':  False,
        'over':      False,
        'timer_id':  None,
        'time_left': 45,
        'max_time':  45,
        'opts':      [],           # [{label, text, correct}]
        'pending':   None,         # letter chosen but not locked
        'hidden50':  [],           # labels hidden by 50:50
    }

# =============================================================
# HELPERS
# =============================================================
def el(id_):
    return document.getElementById(id_)

def show_screen(sid):
    for s in document.querySelectorAll('.screen'):
        s.classList.remove('active')
    el(sid).classList.add('active')

def format_rupee(n):
    # Indian-style grouping: ₹3,20,000
    s = str(n)
    if len(s) <= 3:
        return f'₹{s}'
    result = s[-3:]
    s = s[:-3]
    while len(s) > 2:
        result = s[-2:] + ',' + result
        s = s[:-2]
    if s:
        result = s + ',' + result
    return f'₹{result}'

def build_opts(q_idx):
    q    = QS[q_idx]
    pool = [{'text': q['a'], 'correct': True}] + \
           [{'text': w,       'correct': False} for w in q['w']]
    random.shuffle(pool)
    labels = ['A', 'B', 'C', 'D']
    return [{'label': labels[i], **pool[i]} for i in range(4)]

# =============================================================
# PRIZE LADDER
# =============================================================
def build_ladder():
    lst = el('sbList')
    lst.innerHTML = ''
    for i, prize in enumerate(PRIZES):
        d = document.createElement('div')
        d.className = 'sb-row' + (' milestone' if i in MILESTONES else '')
        d.id = f'sbr{i}'
        d.innerHTML = (f'<span class="sbn">{i+1}</span>'
                       f'<span class="sbp">{prize}</span>')
        lst.appendChild(d)
    update_ladder()

def update_ladder():
    for i in range(len(PRIZES)):
        row = el(f'sbr{i}')
        if not row:
            continue
        row.classList.remove('current', 'done')
        if i < G['q_idx']:
            row.classList.add('done')
        elif i == G['q_idx']:
            row.classList.add('current')
    cur = el(f"sbr{G['q_idx']}")
    if cur:
        cur.scrollIntoView({'block': 'center', 'behavior': 'smooth'})

# =============================================================
# LOAD QUESTION
# =============================================================
def load_q():
    G['answered'] = False
    G['pending']  = None
    G['hidden50'] = []
    G['opts']     = build_opts(G['q_idx'])

    q = QS[G['q_idx']]
    el('qLabel').textContent  = f"Question {G['q_idx']+1} of {TOTAL_Q}"
    el('qText').textContent   = q['q']
    el('tbPrize').textContent = '₹0' if G['q_idx'] == 0 else PRIZES[G['q_idx']-1]

    for opt in G['opts']:
        lbl = opt['label']
        btn = el(f'o{lbl}')
        btn.className     = 'opt'
        btn.disabled      = False
        btn.style.display = 'flex'
        el(f't{lbl}').textContent = opt['text']

    el('ll5050').disabled = G['ll']['5050']
    el('llPhone').disabled = G['ll']['phone']
    el('llAud').disabled   = G['ll']['audience']
    el('llQuit').disabled  = False

    update_ladder()
    start_timer()

# =============================================================
# TIMER
# =============================================================
def start_timer():
    stop_timer()
    G['time_left'] = G['max_time']
    render_timer()

    def tick():
        G['time_left'] -= 1
        render_timer()
        if G['time_left'] <= 0:
            stop_timer()
            if not G['answered']:
                time_up()
        else:
            G['timer_id'] = js.setTimeout(create_proxy(tick), 1000)

    G['timer_id'] = js.setTimeout(create_proxy(tick), 1000)

def stop_timer():
    if G['timer_id'] is not None:
        js.clearTimeout(G['timer_id'])
        G['timer_id'] = None

def render_timer():
    n = el('timerNum')
    f = el('timerFill')
    n.textContent = str(G['time_left'])
    pct = G['time_left'] / G['max_time'] * 100
    f.style.width = f'{pct}%'
    urgent = G['time_left'] <= 10
    if urgent:
        n.classList.add('urgent')
        f.classList.add('urgent')
    else:
        n.classList.remove('urgent')
        f.classList.remove('urgent')

def time_up():
    G['answered'] = True
    disable_all_opts()
    correct = next(o for o in G['opts'] if o['correct'])
    el(f"o{correct['label']}").classList.add('correct')
    js.setTimeout(create_proxy(lambda: end_game(False, True)), 2200)

def disable_all_opts():
    for l in ['A', 'B', 'C', 'D']:
        el(f'o{l}').disabled = True

# =============================================================
# PICK  — show lock-confirm modal (mirrors Python while-loop)
# =============================================================
def pick(letter):
    if G['answered'] or G['over'] or G['pending']:
        return
    for l in ['A', 'B', 'C', 'D']:
        el(f'o{l}').classList.remove('selected')
    el(f'o{letter}').classList.add('selected')
    G['pending'] = letter
    stop_timer()

    chosen = next(o for o in G['opts'] if o['label'] == letter)
    show_modal(
        icon='🔒',
        head='Kya main lock kar doon?',
        body=f'Aapne chunaa: <strong>{letter} — {chosen["text"]}</strong>'
             f'<br/><br/>Kya aap is jawab ko lock karna chahte hain?',
        buttons=[
            ('LOCK KAR DO ✅',   'btn-modal',         lock_answer),
            ('BADLO ↩',          'btn-modal neutral',  change_answer),
        ]
    )

def make_pick(letter):
    def handler(ev):
        pick(letter)
    return create_proxy(handler)

for _l in ['A', 'B', 'C', 'D']:
    el(f'o{_l}').addEventListener('click', make_pick(_l))

# =============================================================
# LOCK ANSWER
# =============================================================
def lock_answer(ev=None):
    close_modal()
    letter        = G['pending']
    G['answered'] = True
    disable_all_opts()
    correct = next(o for o in G['opts'] if o['correct'])

    def reveal():
        if letter == correct['label']:
            # SAHI JAWAB — mirrors Python
            el(f'o{letter}').classList.remove('selected')
            el(f'o{letter}').classList.add('correct')
            G['money_won'] += PRIZE_RAW[G['q_idx']]

            def after_correct():
                if G['q_idx'] == TOTAL_Q - 1:
                    # "7 Crore! mubarakho aapne jeet liya"
                    end_game(True)
                else:
                    G['q_idx'] += 1
                    show_modal(
                        icon='✅',
                        head='Sahi Jawab!',
                        body=f'<strong>SAHI JAWAB!</strong><br/>'
                             f'Aapne jeeta: <strong>{PRIZES[G["q_idx"]-1]}</strong><br/><br/>'
                             f'Kya aap agle sawaal ke liye khelna chahenge?',
                        buttons=[
                            ('HAAN, AGLE SAWAAL ▶',       'btn-modal',        continue_game),
                            ('NAHI, GHAR JAANA HAI 🚪',   'btn-modal danger', modal_quit),
                        ]
                    )
            js.setTimeout(create_proxy(after_correct), 1600)
        else:
            # "Maaf karna ye galat hay."
            el(f'o{letter}').classList.add('wrong')
            el(f"o{correct['label']}").classList.add('correct')
            js.setTimeout(create_proxy(lambda: end_game(False)), 2200)

    js.setTimeout(create_proxy(reveal), 1000)

# =============================================================
# CHANGE ANSWER  — "AAPKA sahi answer baatein"
# =============================================================
def change_answer(ev=None):
    close_modal()
    G['pending'] = None
    for l in ['A', 'B', 'C', 'D']:
        b = el(f'o{l}')
        b.classList.remove('selected')
        b.disabled = False
    # Re-apply 50:50 hidden state
    for l in G['hidden50']:
        el(f'o{l}').classList.add('hidden50')
    start_timer()

def continue_game(ev=None):
    close_modal()
    load_q()

# =============================================================
# QUIT  — "kya aap khelna chahenge?" No → w=True
# =============================================================
def quit_game(ev=None):
    if G['answered'] or G['over']:
        return
    stop_timer()
    G['over'] = True
    disable_all_opts()
    won = format_rupee(G['money_won']) if G['money_won'] > 0 else '₹0'
    show_modal(
        icon='🚪',
        head='Quit & Win',
        body=f"{G['player']}, aap <strong>{won}</strong> lekar ghar ja rahe hain."
             f'<br/><br/>Bahut himmat dikhaya!',
        buttons=[('THEEK HAI, SHUKRIYA', 'btn-modal', lambda ev: _quit_to_result(won))]
    )

def _quit_to_result(won):
    close_modal()
    set_result('🌟', f"Shukriya, {G['player']}!", won, 'Aapne samjhdari se quit kiya!')
    show_screen('resultScreen')

el('llQuit').addEventListener('click', create_proxy(quit_game))

def modal_quit(ev=None):
    close_modal()
    G['over'] = True
    stop_timer()
    won = format_rupee(G['money_won'])
    set_result('🌟', 'Ghar Jaana Hai!', won,
               f"{G['player']}, AAP {won} payse leke ghar jaa rahe hain. Badhai ho!")
    show_screen('resultScreen')

# =============================================================
# LIFELINES
# =============================================================
def use_ll(ll_type):
    if G['ll'][ll_type] or G['answered'] or G['over'] or G['pending']:
        return
    G['ll'][ll_type] = True
    btn_map = {'5050': 'll5050', 'phone': 'llPhone', 'audience': 'llAud'}
    el(btn_map[ll_type]).disabled = True
    correct = next(o for o in G['opts'] if o['correct'])
    if ll_type == '5050':
        do_5050(correct['label'])
    elif ll_type == 'phone':
        do_phone(correct)
    else:
        do_audience(correct['label'])

def make_ll(ll_type):
    def handler(ev):
        use_ll(ll_type)
    return create_proxy(handler)

el('ll5050').addEventListener('click', make_ll('5050'))
el('llPhone').addEventListener('click', make_ll('phone'))
el('llAud').addEventListener('click',   make_ll('audience'))

def do_5050(correct_label):
    wrong = [o for o in G['opts'] if not o['correct']]
    random.shuffle(wrong)
    to_hide = wrong[:2]
    G['hidden50'] = [o['label'] for o in to_hide]
    for o in to_hide:
        el(f"o{o['label']}").classList.add('hidden50')

def do_phone(correct_opt):
    names = ['Rahul Bhai', 'Meera Didi', 'Prof. Anand', 'Suresh Uncle', 'Kavita Auntie']
    name  = random.choice(names)
    g_opt = correct_opt if random.random() > 0.18 else random.choice(
        [o for o in G['opts'] if not o['correct']])
    pct   = random.randint(55, 93)
    show_modal(
        icon='📞',
        head='Phone a Friend',
        body=f'<strong>{name}</strong> bol rahe hain:<br/><br/>'
             f'"Mujhe lagta hai jawab <strong>{g_opt["label"]} — {g_opt["text"]}</strong> hai. '
             f'Mujhe {pct}% yakeen hai."<br/><br/>'
             f'<em style="font-size:.82rem;color:rgba(255,255,255,.4)">Faisla aapka hai!</em>',
        buttons=[('THEEK HAI, SHUKRIYA', 'btn-modal', lambda ev: close_modal())]
    )

def do_audience(correct_label):
    votes = gen_audience_votes(correct_label)
    el('rightPanel').classList.remove('hidden')

    def set_bars():
        for l in ['A', 'B', 'C', 'D']:
            v = votes[l]
            el(f'ab{l}').style.height = f'{v}px'
            el(f'ap{l}').textContent  = f'{round(v / 110 * 100)}%'

    js.setTimeout(create_proxy(set_bars), 220)

def gen_audience_votes(correct_label):
    votes = {'A': 0, 'B': 0, 'C': 0, 'D': 0}
    rem = 110
    votes[correct_label] = random.randint(50, 88)
    rem -= votes[correct_label]
    others = [l for l in ['A', 'B', 'C', 'D'] if l != correct_label]
    for i, l in enumerate(others):
        if i == len(others) - 1:
            votes[l] = max(0, rem)
        else:
            v = min(random.randint(0, 20), rem)
            votes[l] = v
            rem -= v
    return votes

# =============================================================
# END GAME
# =============================================================
def end_game(won, timed_out=False):
    G['over'] = True
    stop_timer()

    if won:
        # "7 Crore! mubarakho aapne jeet liya"
        set_result('🏆', '7 CRORE! MUBARAKHO!', '₹7,00,00,000',
                   f"{G['player']}, aapne jeet liya! "
                   f"AAP ₹7,00,00,000 rupay leke ghar ja rahe hain!")
        launch_confetti()
        js.setTimeout(create_proxy(lambda: show_screen('resultScreen')), 900)

    elif timed_out:
        safe = get_safe()
        set_result('⏰', 'Samay Khatam!', safe,
                   f"{G['player']}, waqt nikal gaya. {safe} lekar ghar ja rahe hain.")
        js.setTimeout(create_proxy(lambda: show_screen('resultScreen')), 500)

    else:
        safe = get_safe()
        # Mirrors Python: m>=320000 → safe | m>=10000 → safe | else ₹0
        if safe == '₹0':
            set_result('😢', 'Maaf Karna!', '₹0',
                       f"{G['player']}, ye galat tha. "
                       f"Aap khaali haath ghar ja rahe hain. Agli baar zaroor!")
        else:
            set_result('💰', 'Badhai Ho!', safe,
                       f"{G['player']}, galat jawab. "
                       f"Magar aap safe amount {safe} lekar ghar ja rahe hain!")
        js.setTimeout(create_proxy(lambda: show_screen('resultScreen')), 500)

def get_safe():
    # Mirrors Python final block
    if G['money_won'] >= 320000:
        return '₹3,20,000'
    if G['money_won'] >= 10000:
        return '₹10,000'
    return '₹0'

def set_result(icon, title, amount, msg):
    el('rsIcon').textContent   = icon
    el('rsTitle').textContent  = title
    el('rsAmount').textContent = amount
    el('rsMsg').textContent    = msg

# =============================================================
# RESTART
# =============================================================
def restart(ev=None):
    reset_state()
    el('rightPanel').classList.add('hidden')
    for l in ['A', 'B', 'C', 'D']:
        el(f'ab{l}').style.height = '0px'
        el(f'ap{l}').textContent  = '0%'
    el('nameInput').value = ''
    show_screen('nameScreen')

el('btnRestart').addEventListener('click', create_proxy(restart))
el('btnHome').addEventListener('click', create_proxy(
    lambda ev: window.location.assign('/')))

# =============================================================
# MODAL  (dynamic buttons via list of tuples)
# =============================================================
_modal_proxies = []   # keep proxies alive to prevent GC

def show_modal(icon, head, body, buttons):
    global _modal_proxies
    _modal_proxies = []

    el('mIcon').textContent   = icon
    el('mHead').textContent   = head
    el('mBody').innerHTML     = body
    footer = el('mFooter')
    footer.innerHTML = ''

    for label, cls, handler in buttons:
        btn = document.createElement('button')
        btn.textContent = label
        btn.className   = cls
        proxy = create_proxy(handler)
        _modal_proxies.append(proxy)
        btn.addEventListener('click', proxy)
        footer.appendChild(btn)

    el('modal').classList.add('show')

def close_modal():
    el('modal').classList.remove('show')

# =============================================================
# CONFETTI  (gold + multi-colour on 7 crore win)
# =============================================================
def launch_confetti():
    colors = ['#FFD700', '#FFF5CC', '#FF6500', '#00E676', '#1565FF', '#FF4081']
    for i in range(120):
        def drop(idx=i):
            piece = document.createElement('div')
            piece.className = 'confetti'
            c    = random.choice(colors)
            w    = random.randint(6, 14)
            h    = random.randint(6, 14)
            dur  = round(1.5 + random.random() * 2.5, 2)
            dly  = round(random.random() * 0.6, 2)
            br   = '50%' if random.random() > 0.5 else '2px'
            lft  = round(random.random() * 100, 1)
            piece.style.cssText = (
                f'left:{lft}vw; background:{c}; width:{w}px; height:{h}px;'
                f'animation-duration:{dur}s; animation-delay:{dly}s; border-radius:{br};'
            )
            document.body.appendChild(piece)
            js.setTimeout(create_proxy(lambda: piece.remove()), 4500)
        js.setTimeout(create_proxy(drop), i * 28)

# =============================================================
# START GAME
# =============================================================
def start_game(ev=None):
    nm = el('nameInput').value.strip()
    G['player'] = nm if nm else 'Contestant'
    el('tbPlayer').textContent = G['player']
    build_ladder()
    show_screen('gameScreen')
    load_q()

el('startBtn').addEventListener('click', create_proxy(start_game))
el('nameInput').addEventListener('keydown', create_proxy(
    lambda ev: start_game() if ev.key == 'Enter' else None))

# =============================================================
# BOOT
# =============================================================
reset_state()
